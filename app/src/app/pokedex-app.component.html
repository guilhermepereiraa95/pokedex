<div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-light transition-theme"
     [class.bg-dark]="isDarkMode" [class.text-white]="isDarkMode">
  <h1 class="mb-0">Pokedex</h1>

  <div class="btn-group" role="group">
    <button
      type="button"
      class="btn d-flex align-items-center gap-2"
      [ngClass]="isDarkMode ? 'btn-outline-light' : 'btn-outline-dark'"
      (click)="toggleTheme()">
      <span>{{ isDarkMode ? '☀️' : '🌙' }}</span>
      {{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}
    </button>
  </div>
</div>

<router-outlet></router-outlet>
