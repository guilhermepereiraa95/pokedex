<div class="pokemon-list-container">
  <div class="search-section">
    <input
      type="text"
      [formControl]="searchControl"
      placeholder="Pesquisar Pokémon..."
      class="search-input"
    />
  </div>

  <div *ngIf="isLoading" class="loading">Carregando...</div>

  <div class="pokemon-grid">
    <div
      *ngFor="let pokemon of displayList"
      class="pokemon-card"
      (click)="viewDetails(pokemon)"
    >
      <img [src]="pokemon.sprite" [alt]="pokemon.name" class="pokemon-image" />
      <h3 class="pokemon-name">{{ pokemon.name | titlecase }}</h3>
      <div class="pokemon-types">
        <span *ngFor="let type of pokemon.types" class="type-badge">
          {{ type }}
        </span>
      </div>
    </div>
  </div>

  <div class="load-more-section" *ngIf="!searchControl.value && !isLoading">
    <button (click)="loadPokemonList()" class="load-more-btn">
      Carregar Mais
    </button>
  </div>

  <div *ngIf="displayList.length === 0 && !isLoading" class="no-results">
    Nenhum Pokémon encontrado.
  </div>
</div>
